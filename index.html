<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <script>
      ;(function () {
        try {
          var d = document.documentElement
          var a = localStorage.getItem('still.appearance')
          d.dataset.appearance = a === 'dark' || a === 'light' ? a : 'light'
          var t = localStorage.getItem('still.theme')
          if ((t === 'stone' || t === 'clay') && d.dataset.appearance === 'light') d.dataset.theme = t
        } catch (e) {
          document.documentElement.dataset.appearance = 'light'
        }
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Newsreader:ital,opsz,wght@0,6..24,400;0,6..24,500;0,6..24,600;1,6..24,400&display=swap"
      rel="stylesheet"
    />
    <meta name="theme-color" content="#f4f0e6" />
    <meta name="description" content="Still — a calm, private journal in your browser." />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>Still</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
